<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F7F3E9" />
    <title>Premium Pet Boarding — Safe, Loving Pet Care</title>
    <meta name="description" content="Premium Pet Boarding: professional dog boarding, daycare, grooming, and pet sitting in YourCity, YourState. Safe, loving, and experienced caregivers. Book now!" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.ico" />
  </head>
  <body>
    <div id="root">
      <div style="padding:40px;font-family:sans-serif;color:#900;background:#fff;border:4px solid #fee;max-width:900px;margin:40px auto;border-radius:8px;">
        <h2 style="margin:0 0 8px;">App failed to render</h2>
        <p style="margin:0">If the page remains blank after JS loads, open the browser console for errors. The dev server is running at <strong>http://localhost:5174/</strong>.</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Capture global errors and display them in the page fallback so they are visible without opening DevTools
      window.addEventListener('error', function(e){
        try{
          const root = document.getElementById('root')
          if(root){
            const pre = document.createElement('pre')
            pre.style.background = '#fff5f5'
            pre.style.color = '#900'
            pre.style.padding = '12px'
            pre.style.borderRadius = '6px'
            pre.textContent = (e && e.error && e.error.stack) ? e.error.stack : (e.message || String(e))
            root.innerHTML = ''
            const heading = document.createElement('h2')
            heading.textContent = 'Client error detected'
            heading.style.color = '#900'
            root.appendChild(heading)
            root.appendChild(pre)
          }
        }catch(err){
          // noop
        }
      })
      window.addEventListener('unhandledrejection', function(ev){
        try{
          const root = document.getElementById('root')
          if(root){
            const pre = document.createElement('pre')
            pre.style.background = '#fff5f5'
            pre.style.color = '#900'
            pre.style.padding = '12px'
            pre.style.borderRadius = '6px'
            pre.textContent = ev.reason && ev.reason.stack ? ev.reason.stack : JSON.stringify(ev.reason)
            root.innerHTML = ''
            const heading = document.createElement('h2')
            heading.textContent = 'Unhandled rejection'
            heading.style.color = '#900'
            root.appendChild(heading)
            root.appendChild(pre)
          }
        }catch(err){ }
      })
    </script>
  </body>
</html>
